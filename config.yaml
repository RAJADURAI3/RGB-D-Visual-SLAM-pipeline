dataset:
  path:  "C:/Users/Hi/OneDrive/Desktop/SLAM/data/freiburg_xyz" 
  max_frames: 300

camera:
  fx: 525.0
  fy: 525.0
  cx: 319.5
  cy: 239.5

slam:
  orb_features: 2000
  ransac_thresh: 1.0
  depth_scale: 5000.0
